# ทุกค่าจาก env — service นี้ stateless: ไม่มี DB, presence อยู่ใน memory โดยตั้งใจ
server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{requestId:-—}] %logger{24} : %msg%n"

spring:
  application:
    name: presence-service

jwt:
  secret: ${JWT_SECRET}   # ต้องเป็นค่าเดียวกับ auth-service — นี่คือสัญญาใจของทั้งระบบ

ws:
  allowed-origins: ${ALLOWED_ORIGINS:*}   # dev เปิดกว้าง — prod ตั้งเป็น origin ของ lab-web
